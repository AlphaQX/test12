name: Build Windows EXE

on:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Build
        shell: msys2 {0}
        run: |
          gcc main.c -o calculator.exe

      - uses: actions/upload-artifact@v4
        with:
          name: calculator
          path: calculator.exe
