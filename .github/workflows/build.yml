name: Build Windows EXE

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MinGW
        uses: egor-tensin/setup-mingw@v2

      - name: Compile C Program
        run: |
          gcc main.c -o calculator.exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: calculator
          path: calculator.exe
